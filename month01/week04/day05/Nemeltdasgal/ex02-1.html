<body>
    <b>This text is bold</b>
    <i>This text is italic</i>

    <p><i>Sain</i> hun baih hetsuu</p>

    <p>I like to <del>walk</del> <ins>fly</ins> with plane</p>

    <p>x<sup>2</sup> + y<sup>2</sup> = z<sup>2</sup></p>
