<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>

    <style>
        #first {
            font-size: 30px;
            color: rgb(144, 50, 240);
            background-color: yellow;
        }
        #second {
            font-size: 20px;
            color: blue;
            background-color: darkcyan;
        }
        #third {
            font-size: 45px;
            color: rgb(200, 100, 50);
            background-color: wheat;
        }
    </style>
</head>
<body>
    <h1>CSS intro</h1>
    <h2>CSS Internal styling</h2>
    <!-- -->
    <main>
        <h3>CSS Selectors</h3>

        <div id="first">
            First paragraph
        </div>

        <div id="second">
            Second paragraph
        </div>
        
        <div id="third">
            third paragraph
        </div>
    </main>
</body>
</html>
